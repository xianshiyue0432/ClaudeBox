name: Release

on:
  push:
    tags:
      - 'v*'

# ─────────────────────────────────────────────────────────────────────
# Secrets (all optional — omit Apple secrets to skip signing):
#
#   TAURI_SIGNING_PRIVATE_KEY / _PASSWORD   Tauri updater signing
#   APPLE_CERTIFICATE                       Base64 .p12 (Developer ID Application)
#   APPLE_CERTIFICATE_PASSWORD              Password for the .p12
#   APPLE_SIGNING_IDENTITY                  e.g. "Developer ID Application: ..."
#   APPLE_ID / APPLE_ID_PASSWORD            Notarization credentials
#   APPLE_TEAM_ID                           10-char Team ID
#   KEYCHAIN_PASSWORD                       Arbitrary CI keychain password
#   HOMEBREW_TAP_TOKEN                      PAT with repo scope for homebrew-tap
# ─────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Build (+ optional Sign) per platform
  # ═══════════════════════════════════════════════════════════════════
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build sidecars
        run: |
          npm run build:sidecar
          npm run build:lark-sidecar

      # ── macOS: Import certificate (skipped if secret not set) ──
      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      # ── Build and upload to GitHub Release ──
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClaudeBox ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ═══════════════════════════════════════════════════════════════════
  # Update Homebrew Cask (after all builds finish)
  # ═══════════════════════════════════════════════════════════════════
  update-homebrew:
    needs: release
    runs-on: macos-latest
    if: ${{ !failure() && !cancelled() }}
    permissions:
      contents: write  # needed to read draft releases via API

    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release DMGs and compute SHA256
        id: sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p /tmp/assets

          # Find the release (including drafts) by tag via API
          RELEASE_ID=$(gh api repos/braverior/ClaudeBox/releases \
            --jq ".[] | select(.tag_name==\"${TAG}\") | .id" | head -1)
          echo "Release ID: ${RELEASE_ID:-NOT FOUND}"

          # Download DMGs via API (works for draft releases)
          if [ -n "$RELEASE_ID" ]; then
            for arch in aarch64 x64; do
              ASSET_URL=$(gh api "repos/braverior/ClaudeBox/releases/${RELEASE_ID}/assets" \
                --jq ".[] | select(.name==\"ClaudeBox_${VERSION}_${arch}.dmg\") | .url")
              if [ -n "$ASSET_URL" ]; then
                echo "Downloading ClaudeBox_${VERSION}_${arch}.dmg ..."
                gh api "$ASSET_URL" -H "Accept: application/octet-stream" \
                  > "/tmp/assets/ClaudeBox_${VERSION}_${arch}.dmg"
              else
                echo "Asset ClaudeBox_${VERSION}_${arch}.dmg not found in release"
              fi
            done
          fi

          # Compute SHA256
          SHA_ARM=""; SHA_X64=""
          [[ -f "/tmp/assets/ClaudeBox_${VERSION}_aarch64.dmg" ]] && \
            SHA_ARM=$(shasum -a 256 "/tmp/assets/ClaudeBox_${VERSION}_aarch64.dmg" | awk '{print $1}')
          [[ -f "/tmp/assets/ClaudeBox_${VERSION}_x64.dmg" ]] && \
            SHA_X64=$(shasum -a 256 "/tmp/assets/ClaudeBox_${VERSION}_x64.dmg" | awk '{print $1}')

          echo "sha_arm=${SHA_ARM}" >> "$GITHUB_OUTPUT"
          echo "sha_x64=${SHA_X64}" >> "$GITHUB_OUTPUT"
          echo "ARM SHA256: ${SHA_ARM:-MISSING}"
          echo "X64 SHA256: ${SHA_X64:-MISSING}"

      - name: Update Homebrew Cask
        if: steps.sha.outputs.sha_arm != '' || steps.sha.outputs.sha_x64 != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_ARM="${{ steps.sha.outputs.sha_arm }}"
          SHA_X64="${{ steps.sha.outputs.sha_x64 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/braverior/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Casks

          cat > /tmp/tap/Casks/claudebox.rb << 'CASK'
          cask "claudebox" do
            version "VERSION_PH"

            on_arm do
              url "https://github.com/braverior/ClaudeBox/releases/download/v#{version}/ClaudeBox_#{version}_aarch64.dmg"
              sha256 "SHA_ARM_PH"
            end

            on_intel do
              url "https://github.com/braverior/ClaudeBox/releases/download/v#{version}/ClaudeBox_#{version}_x64.dmg"
              sha256 "SHA_X64_PH"
            end

            name "ClaudeBox"
            desc "Native desktop GUI for Claude Code"
            homepage "https://github.com/braverior/ClaudeBox"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :ventura"

            app "ClaudeBox.app"

            zap trash: [
              "~/.claudebox",
              "~/Library/Application Support/com.claudebox.desktop",
              "~/Library/Caches/com.claudebox.desktop",
              "~/Library/Preferences/com.claudebox.desktop.plist",
              "~/Library/Saved Application State/com.claudebox.desktop.savedState",
            ]
          end
          CASK

          # Strip leading 10 spaces from heredoc and replace placeholders
          sed -i '' 's/^          //' /tmp/tap/Casks/claudebox.rb
          sed -i '' "s/VERSION_PH/${VERSION}/" /tmp/tap/Casks/claudebox.rb
          sed -i '' "s/SHA_ARM_PH/${SHA_ARM}/" /tmp/tap/Casks/claudebox.rb
          sed -i '' "s/SHA_X64_PH/${SHA_X64}/" /tmp/tap/Casks/claudebox.rb

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/claudebox.rb
          git diff --cached --quiet || {
            git commit -m "claudebox ${VERSION}"
            git push
          }
